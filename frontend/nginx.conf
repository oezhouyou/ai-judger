# Rate limiting: 10 requests/sec per IP, burst up to 20
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen       80;
    server_name  localhost;

    client_max_body_size 55m;

    # --- Security headers ---
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; script-src 'self'" always;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # --- Proxy API requests to the FastAPI backend ---
    # Trailing slash on proxy_pass strips the /api/ prefix
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # --- Serve static frontend files ---
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|svg|ico|woff2?)$ {
        root   /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
